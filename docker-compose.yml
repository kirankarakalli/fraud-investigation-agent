services:

  api:
    build: .
    container_name: fraud-api
    ports:
      - "8000:8000"
    env_file:
      - .env

  streamlit:
    build: .
    container_name: fraud-ui
    env_file:
      - .env
    command: >
      uv run streamlit run streamlit_app.py
      --server.address 0.0.0.0
      --server.port 8501
    ports:
      - "8501:8501"